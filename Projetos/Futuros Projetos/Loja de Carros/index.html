<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FP Sellection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="./img/logo.png" alt="logo fp">
        <nav>
            <ul>
                <li>Home</li>
                <li>Carros</li>
                <li>Fale Conosco</li>
            </ul>
        </nav>
    </header>

    <section>
        <div class="list">
            <div class="item">
                <div class="car-img">
                    <img src="./img/1.png" alt="imagem do carro">
                </div>
            </div>
            <div class="conteudo">
                <p class="car-information">
                    Único Dono
                </p>
                <h2>
                    Ferrari
                </h2>
                <p class="descrição">
                 Lorem ipsum dolor sit amet consectetur adipisicing elit. Aperiam eveniet, dolores praesentium iusto ipsam repellat dolorem minima reprehenderit delectus, maiores cumque nostrum labore fugiat quidem sequi tenetur velit eligendi! Sapiente!
                </p>
                <button>
                    Saiba mais
                </button>
            </div>
        </div>


        <div class="setas">
            <button><img src="./img/arrow.png" alt="seta esquerda"></button>
            <button><img src="./img/arrow.png" alt="seta direita"></button>
        </div>

        <div class="indicadores">
            <div class="numero">01</div>
            <ul>
                <li class="ativo"></li>
                <li></li>
                <li></li>
            </ul>
        </div>
    </section>
</body>
</html>

            <div class="mensagem"></div>
            <ul id="listaManha"> <!--MÁXIMO DE 7 TAREFAS-->

            </ul>
        </div>
        <div class="tarde">

            </section>
            <button id="adicionarTarde" onclick="adicionarTarefaTarde()" type="submit">Adicionar</button>
            <div class="mensagem"></div>
            <ul id="listaTarde"> <!--MÁXIMO DE 7 TAREFAS-->
                <!--LISTA DE TAREFAS A SEREM SELECIONADAS-->
                <p class="tarefaTarde"></p>
            </ul>
        </div>
        <div class="noite">

            </section>
            <button id="adicionarNoite" onclick="adicionarTarefaNoite()">Adicionar</button>
            <div class="mensagem"></div>
            <ul id="listaNoite"> <!--MÁXIMO DE 7 TAREFAS-->
                <!--LISTA DE TAREFAS A SEREM SELECIONADAS-->
                <p class="tarefaNoite"></p>
            </ul>
        </div>
        <aside class="botoes">
            <button class="salvar" onclick="salvar()">Salvar</button>
            <button class="excluir" style="opacity: 0.6; cursor:not-allowed;" onclick="excluir()">Excluir</button>
            <!--SÓ DEVE APARECER QUANDO HOUVER TAREFAS-->
            <button class="limpar" onclick="limpar()">Limpar lista</button>
        </aside>
    </div>
    </div>

    <section class="rodape">
